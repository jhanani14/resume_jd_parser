{% extends "base.html" %}

{% block title %}Login - Resume JD Matcher{% endblock %}

{% block content %}
<div class="container">
    <div class="row vh-100 align-items-center justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card shadow-lg border-0">
                <div class="card-body p-5">
                    
                    <div class="text-center mb-4">
                        <i class="fas fa-file-alt" style="font-size: 3rem; color: #2563eb; margin-bottom: 1rem;"></i>
                        <h3 class="mb-2">Welcome Back</h3>
                        <p class="text-muted">Sign in to your Resume Matcher account</p>
                    </div>

                    {% if error %}
                        <div class="alert alert-danger alert-dismissible fade show" role="alert">
                            <i class="fas fa-exclamation-circle me-2"></i>{{ error }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endif %}

                    
                    <form method="POST">
                        <div class="mb-3">
                            <label for="username" class="form-label">
                                <i class="fas fa-user me-2" style="color: #2563eb;"></i>Username
                            </label>
                            <input 
                                type="text" 
                                id="username"
                                name="username" 
                                class="form-control form-control-lg" 
                                placeholder="Enter your username" 
                                required
                                autofocus>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label">
                                <i class="fas fa-lock me-2" style="color: #2563eb;"></i>Password
                            </label>
                            <input 
                                type="password" 
                                id="password"
                                name="password" 
                                class="form-control form-control-lg" 
                                placeholder="Enter your password" 
                                required>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">
                            <i class="fas fa-sign-in-alt me-2"></i>Sign In
                        </button>
                    </form>

                    
                    <div class="text-center mb-3">
                        <span class="text-muted">New here?</span>
                    </div>

                    
                    <a href="/register" class="btn btn-outline-primary btn-lg w-100">
                        <i class="fas fa-user-plus me-2"></i>Create Account
                    </a>
                </div>
            </div>

            
            <p class="text-center text-muted small mt-4 mb-0">
                <i class="fas fa-shield-alt me-1"></i>Your data is secure and encrypted
            </p>
        </div>
    </div>
</div>
{% endblock %}
