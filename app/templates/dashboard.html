<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h2 class="mb-4 text-center">Resume vs Job Description Matcher</h2>

    {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form action="/analyze" method="post" enctype="multipart/form-data">

        <div class="row">

            <!-- Resume Card -->
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        Resume Input
                    </div>
                    <div class="card-body">

                        <label class="form-label">Upload Resume (PDF, DOCX, TXT)</label>
                        <input type="file" name="resume_file" class="form-control mb-3">

                        <label class="form-label">OR Paste Resume Text</label>
                        <textarea name="resume_text" rows="6" class="form-control"></textarea>

                    </div>
                </div>
            </div>

            <!-- JD Card -->
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-success text-white">
                        Job Description Input
                    </div>
                    <div class="card-body">

                        <label class="form-label">Upload JD (PDF, DOCX, TXT)</label>
                        <input type="file" name="jd_file" class="form-control mb-3">

                        <label class="form-label">OR Paste JD Text</label>
                        <textarea name="jd_text" rows="6" class="form-control"></textarea>

                    </div>
                </div>
            </div>

        </div>

        <div class="text-center mt-4">
            <button type="submit" class="btn btn-dark btn-lg">
                Analyze Resume
            </button>
        </div>

    </form>

</div>

</body>
</html>
